name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

jobs:
  release:
    name: Publish to RubyGems
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'

      - name: Verify tag matches version
        run: |
          gem_version="v$(ruby -r./lib/gvltools/version -e 'print GVLTools::VERSION')"
          if [ "$gem_version" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match gem version $gem_version" >&2
            exit 1
          fi

      - name: Install dependencies
        run: bundle install --jobs 4

      - name: Publish gem
        uses: rubygems/release-gem@v1
